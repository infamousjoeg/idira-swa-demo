# portal-stub.yaml — M2-only smoketest helper.
#
# A bare curl pod under the `portal` ServiceAccount. The carrier service is
# only reachable from inside the cluster (ClusterIP), so smoke-m2.sh runs its
# /lookup requests via `kubectl exec portal-stub -- curl ...`.
#
# In M3 this file goes away — the real `apps/portal` Deployment will use the
# same `portal` ServiceAccount (so SPIFFE identity continuity is preserved
# across the swap-out), and smoke-ui.sh uses Playwright against the portal UI
# rather than curl against the carrier.
#
# The SA is shared with M3's portal so its SPIFFE ID lines up with
# spiffe://idira.demo/kind-ng/ns/swa-demo/sa/portal — same workload_id_template
# the carrier uses (M1 Task 8). Even though M2 doesn't exchange the portal's
# JWT-SVID anywhere, declaring the SA now keeps the identity hierarchy stable.

apiVersion: v1
kind: ServiceAccount
metadata:
  name: portal
  namespace: swa-demo
---
apiVersion: v1
kind: Pod
metadata:
  name: portal-stub
  namespace: swa-demo
  labels:
    app: portal-stub
    app.kubernetes.io/part-of: idira-swa-demo
    app.kubernetes.io/component: smoketest-helper
spec:
  serviceAccountName: portal
  # Tiny resource footprint — this is a kubectl-exec target, not a workload.
  containers:
    - name: curl
      image: curlimages/curl:8.10.1
      command: ["sleep", "infinity"]
      resources:
        requests:
          cpu: "10m"
          memory: "16Mi"
        limits:
          cpu: "100m"
          memory: "64Mi"
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        # NB: not readOnlyRootFilesystem — smoke-m2.sh writes /tmp/trace.out
        # inside this container to capture an SSE stream. Stub pod, not a
        # production workload; keep the test ergonomics simple.
  restartPolicy: Always
  terminationGracePeriodSeconds: 1
