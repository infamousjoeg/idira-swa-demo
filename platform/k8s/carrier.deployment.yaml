apiVersion: apps/v1
kind: Deployment
metadata:
  name: carrier
  namespace: swa-demo
  labels: {app: carrier}
spec:
  replicas: 1
  selector: {matchLabels: {app: carrier}}
  template:
    metadata:
      labels: {app: carrier}
    spec:
      serviceAccountName: carrier
      containers:
        - name: carrier
          image: idira/carrier:m2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8443
              name: https
            - containerPort: 8444
              name: trace
          env:
            - name: PANW_SM_URL
              valueFrom:
                configMapKeyRef: {name: carrier-config, key: sm_url}
            - name: CARRIER_SECRET_ID
              valueFrom:
                configMapKeyRef: {name: carrier-config, key: secret_id}
            - name: SPIFFE_ENDPOINT_SOCKET
              value: unix:///run/swa-agent/api.sock
            # M3: only this exact SPIFFE ID is accepted on mTLS — spec §13.4 #4.
            - name: PORTAL_SPIFFE_ID
              value: spiffe://idira.demo/kind-ng/ns/swa-demo/sa/portal
          volumeMounts:
            - name: swa-agent-socket
              mountPath: /run/swa-agent
              readOnly: true
          readinessProbe:
            # mTLS gates :8443 but a HTTPS probe with httpGet.scheme=HTTPS
            # completes the TLS handshake without sending a client cert —
            # kubelet validates the server cert against the cluster CA bundle.
            # That's not what we want (kubelet has no SPIFFE cert), so use a
            # TCP probe instead: success means the listener is up + TLS is
            # accepting. The /healthz path is unreachable post-mTLS upgrade
            # without a client cert anyway.
            tcpSocket: {port: https}
            initialDelaySeconds: 2
            periodSeconds: 5
      volumes:
        - name: swa-agent-socket
          hostPath:
            path: /tmp/swa-agent/public
            type: Directory
